<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feishu SheetMate Preview</title>
    <link rel="stylesheet" href="vendor/katex/katex.min.css">
    <link rel="stylesheet" href="sidepanel.css">
    <script src="vendor/katex/katex.min.js" defer></script>
    <script src="sidepanel.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <h1 class="toolbar__title">预览</h1>
        <div class="layout-switch" aria-label="切换布局">
          <button class="layout-switch__button" data-layout="single" type="button">单</button>
          <button class="layout-switch__button" data-layout="columns" type="button">左/右</button>
          <button class="layout-switch__button" data-layout="rows" type="button">上/下</button>
        </div>
      </header>

      <main class="board" data-layout="single" id="board">
        <section class="pane" data-pane-id="paneA">
          <button class="pane__header" type="button">
            <strong class="pane__title">A</strong>
            <span class="pane__badge">跟随中</span>
          </button>
          <div class="pane__controls">
            <select class="mode-select" data-pane-id="paneA" aria-label="分栏 A 渲染模式">
              <option value="auto">自动</option>
              <option value="text">文本</option>
              <option value="markdown">Markdown</option>
              <option value="json">JSON</option>
              <option value="latex">LaTeX</option>
              <option value="media">媒体</option>
            </select>
            <p class="pane__meta">等待飞书表格中的单元格选区…</p>
          </div>
          <div class="pane__content" data-pane-content="paneA"></div>
        </section>

        <section class="pane" data-pane-id="paneB">
          <button class="pane__header" type="button">
            <strong class="pane__title">B</strong>
            <span class="pane__badge">冻结中</span>
          </button>
          <div class="pane__controls">
            <select class="mode-select" data-pane-id="paneB" aria-label="分栏 B 渲染模式">
              <option value="auto">自动</option>
              <option value="text">文本</option>
              <option value="markdown">Markdown</option>
              <option value="json">JSON</option>
              <option value="latex">LaTeX</option>
              <option value="media">媒体</option>
            </select>
            <p class="pane__meta">等待飞书表格中的单元格选区…</p>
          </div>
          <div class="pane__content" data-pane-content="paneB"></div>
        </section>
      </main>
    </div>
  </body>
</html>
